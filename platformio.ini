; ============================================================
;  Apple Home Controller — LilyGO T-Display S3 Pro
; ============================================================
[env:tdisplay-s3-pro]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.partitions          = partitions_ota.csv
board_upload.flash_size         = 16MB

upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

build_src_filter = +<*> -<ha/ha_client.cpp> -<homekit/>

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -I src
    ; LVGL — point it at our lv_conf.h in src/
    -DLV_CONF_INCLUDE_SIMPLE
    ; Allow custom font C files (outside LVGL lib) to find lvgl.h with #include "lvgl.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE
    ; Speed
    -O2

lib_deps =
    lvgl/lvgl @ ^8.3.11
    lovyan03/LovyanGFX @ ^1.1.16
    bblanchon/ArduinoJson @ ^6.21.5
    tzapu/WiFiManager @ ^2.0.17
    https://github.com/lewisxhe/SensorsLib.git
    https://github.com/lewisxhe/XPowersLib.git
