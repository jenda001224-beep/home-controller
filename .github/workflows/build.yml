name: Build & Deploy Flasher

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile firmware
        run: python -m platformio run -e tdisplay-s3-pro

      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html    _site/index.html
          cp site/manifest.json _site/manifest.json
          cp .pio/build/tdisplay-s3-pro/bootloader.bin _site/bootloader.bin
          cp .pio/build/tdisplay-s3-pro/partitions.bin _site/partitions.bin
          cp .pio/build/tdisplay-s3-pro/firmware.bin   _site/firmware.bin
          BOOT=$(find ~/.platformio/packages -name "boot_app0.bin" | head -1)
          cp "$BOOT" _site/boot_app0.bin

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
